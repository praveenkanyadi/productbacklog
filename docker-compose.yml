services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edm
      POSTGRES_PASSWORD: edm
      POSTGRES_DB: edm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edm"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.24.0
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=edm
      - POSTGRES_PWD=edm
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.26.2
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      - temporal

volumes:
  postgres_data:
